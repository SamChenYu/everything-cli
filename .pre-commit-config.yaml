repos:

# Basic safety hooks
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.6.0
  hooks:
    - id: detect-private-key
    - id: end-of-file-fixer
    - id: trailing-whitespace

# Secret scanning (MAIN protection)
- repo: https://github.com/Yelp/detect-secrets
  rev: v1.5.0
  hooks:
    - id: detect-secrets
      args: ["--baseline", ".secrets.baseline"]

# Block committing real .env files
- repo: local
  hooks:
    - id: forbid-env-files
      name: Prevent committing real .env
      entry: bash -c 'git diff --cached --name-only | grep -E "(^|/)\.env$" && echo "❌ Do not commit .env files" && exit 1 || exit 0'
      language: system

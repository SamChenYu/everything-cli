repos:

# Basic safety hooks
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.6.0
  hooks:
    - id: detect-private-key
    - id: end-of-file-fixer
    - id: trailing-whitespace

# Secret scanning (MAIN protection)
- repo: https://github.com/Yelp/detect-secrets
  rev: v1.5.0
  hooks:
    - id: detect-secrets
      args: ["--baseline", ".secrets.baseline"]

# Block committing real .env files (but allow .env.sample)
- repo: local
  hooks:
    - id: forbid-env-files
      name: Prevent committing .env files (except .env.sample)
      entry: bash -c 'git diff --cached --name-only | grep -E "\.env" | grep -v "\.env\.sample$" && echo "ERROR Do not commit .env files (only .env.sample is allowed)" && exit 1 || exit 0'
      language: system
    - id: forbid-credentials
      name: Prevent committing credential files
      entry: bash -c 'git diff --cached --name-only | grep -E "\.(key|pem|p12|pfx|keystore|jks)$|credentials|service-account|secrets\.(json|yaml|yml)$" | grep -v "\.sample$" && echo "ERROR Do not commit credential or key files" && exit 1 || exit 0'
      language: system
